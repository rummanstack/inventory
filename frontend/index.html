    <script>
      (function () {
        // Landing/legal routes are light-only; pre-marking them here keeps
        // the stored dark theme from flashing in before React mounts.
        var lightOnly = ['/landing', '/terms', '/privacy-policy', '/founder', '/pricing', '/contact', '/get-started'];
        var lightPrefixes = ['/features', '/solutions'];
        var isLightPage = lightOnly.indexOf(location.pathname) !== -1 || lightPrefixes.some(function (prefix) {
          return location.pathname === prefix || location.pathname.indexOf(prefix + '/') === 0;
        });
        if (isLightPage) {
          document.documentElement.classList.add('landing-page-active');
        }
        try {
          if (localStorage.getItem('stockledger.theme') === 'dark') {
            document.documentElement.dataset.theme = 'dark';
          }
        } catch (e) { /* private mode */ }
      })();
    </script>

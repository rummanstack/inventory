<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Ledger Inventory</title>
    <meta name="theme-color" content="#373373" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/stockledger-icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/stockledger-icon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/stockledger-icon-180x180.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (function () {
        // Landing/legal routes are light-only; pre-marking them here keeps
        // the stored dark theme from flashing in before React mounts.
        var lightOnly = ['/landing', '/terms', '/privacy-policy', '/founder'];
        if (lightOnly.indexOf(location.pathname) !== -1) {
          document.documentElement.classList.add('landing-page-active');
        }
        try {
          if (localStorage.getItem('stockledger.theme') === 'dark') {
            document.documentElement.dataset.theme = 'dark';
          }
        } catch (e) { /* private mode */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
